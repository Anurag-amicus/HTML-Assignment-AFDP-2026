<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!--SEO and Identity-->
  <title>Attribute App</title>
  <meta name="description" content="A semantic, fully accessible attribute app for AFDP." />
  <link rel="canonical" href="http://localhost:5500/index.html" />
  <meta name="theme-color" content="#ffffff" />

  <!--Open Graph -->
  <meta property="og:title" content="Attribute App" />
  <meta property="og:description" content="A semantic, fully accessible attribute app for AFDP." />
  <meta property="og:type" content="website" />

  <!-- Link and Favicon -->
  <link rel="icon" href="./assets/favicon.ico" />
  <link rel="icon" href="./assets/icon.svg" />
  <link rel="apple-touch-icon" href="./assets/apple-touch-icon.png" />

  <!-- Main Stylesheet -->
  <link rel="stylesheet" href="./css/main.css" />
  <script type="module" defer src="./js/main.js"></script>
</head>

<body>
  <!-- Accessibility Landmark: The Skip-Link allows keyboard users to jump to main content -->
  <a href="#main-content" class="skip-link sr-only">Skip to main content</a>

  <!-- Header Landmark -->
  <header role="banner">
    <h1>Attribute App</h1>
    <button id="theme-toggle" class="btn btn--ghost" aria-label="Toggle theme">🌓 Theme</button>
  </header>
  <!-- Primary Navigation Landmark -->
  <nav role="navigation" aria-label="Primary">
    <ul>
      <li>
        <a href="index.html" aria-current="page">Attribute List</a>
      </li>
      <li>
        <a href="add-attribute.html">Add Attribute</a>
      </li>
    </ul>
  </nav>

  <!-- Main Landmark -->
  <main id="main-content">
    <div id="results-status" class="sr-only" aria-live="polite"></div>
    <!-- Section 1: Filtering Attributes -->
    <section aria-labelledby="filter-heading">
      <h2 id="filter-heading">Filter Attributes</h2>

      <!-- Search Landmark Role for Form Filters -->
      <form role="search" method="get" action="index.html" aria-label="Filter attributes">
        <div class="form-field">
          <label class="form-field__label" for="search-term">Search Attribute Name</label>
          <input class="form-field__input" type="search" id="search-term" name="q" inputmode="search" autocomplete="off"
            placeholder="e.g., BillingCode" />
        </div>

        <div class="form-field">
          <label class="form-field__label" for="filter-business-unit">Business Unit</label>
          <select class="form-field__input" id="filter-business-unit" name="businessUnit">
            <option value="">All Business Units</option>
            <option value="sales">Sales</option>
            <option value="finance">Finance</option>
            <option value="marketing">Marketing</option>
          </select>
        </div>

        <div class="form-field">
          <label class="form-field__label" for="filter-status">Status</label>
          <select class="form-field__input" id="filter-status" name="status">
            <option value="">All Statuses</option>
            <option value="active">Active Only</option>
            <option value="inactive">Inactive Only</option>
          </select>
        </div>
      </form>
    </section>

    <!-- Section 2: Core Data Content -->
    <section aria-labelledby="data-heading">
      <h2 id="data-heading">Attributes</h2>

      <!--Table for displaying attributes-->
      <table class="table">
        <caption>
          List of all attributes
        </caption>
        <thead>
          <tr>
            <!-- Added IDs for the headers attribute mapping in the Actions column -->
            <th id="column-id" scope="col" aria-sort="none">
              <button type="button" class="btn btn--ghost">ID</button>
            </th>
            <th id="column-name" scope="col" aria-sort="none">
              <button type="button" class="btn btn--ghost">Attribute Name</button>
            </th>
            <th id="column-business-unit" scope="col" aria-sort="none">
              <button type="button" class="btn btn--ghost">Business Unit</button>
            </th>
            <th id="column-location" scope="col" aria-sort="none">
              <button type="button" class="btn btn--ghost">Location</button>
            </th>
            <th id="column-company" scope="col" aria-sort="none">
              <button type="button" class="btn btn--ghost">Company</button>
            </th>
            <th id="column-created-on" scope="col" aria-sort="none">
              <button type="button" class="btn btn--ghost">Created On</button>
            </th>
            <th id="column-status" scope="col" aria-sort="none">
              <button type="button" class="btn btn--ghost">Status</button>
            </th>
            <th id="column-actions" scope="col">Actions</th>
          </tr>
        </thead>
        <tbody aria-live="polite">
        </tbody>
      </table>
    </section>

    <aside aria-labelledby="stats-heading">
      <h2 id="stats-heading">Quick Statistics</h2>
      <div class="stats-card">
        <ul>
          <li id="statistic-total">Total Tracked Attributes: 0</li>
          <li id="statistic-active">Operational Active States: 0</li>
        </ul>
      </div>
    </aside>
  </main>
  <footer role="contentinfo">
    <p>
      &copy; 2026 Amicus Fresher developer program(AFDP). All rights reserved.
    </p>
  </footer>
</body>

</html>
